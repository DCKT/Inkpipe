services:
  inkpipe:
    build: .
    image: ghcr.io/dckt/inkpipe:latest
    ports:
      - "3001:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - inkpipe-temp:/tmp/inkpipe
      - inkpipe-data:/data
    depends_on:
      - kcc

  kcc:
    image: ghcr.io/ciromattia/kcc:latest
    container_name: inkpipe-kcc
    volumes:
      - inkpipe-temp:/data
    entrypoint: ["sleep", "infinity"]

volumes:
  inkpipe-temp:
  inkpipe-data:
